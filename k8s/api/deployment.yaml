apiVersion: apps/v1
kind: Deployment
metadata:
  name: controlplane-api
  namespace: controlplane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: controlplane-api
  template:
    metadata:
      labels:
        app: controlplane-api
    spec:
      containers:
        - name: controlplane-api
          image: controlplane-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: controlplane-config
            - secretRef:
                name: controlplane-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
